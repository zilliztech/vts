env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  MongoDB {
    uri = "mongodb://localhost:27017"
    database = "test_db"
    collection = "test_collection"
    schema = {
      fields {
        _id = string
        title = string
        content = string
        category = string
        score = double
        tags = "array<string>"
        views = int
        is_published = boolean
        created_at = timestamp
        embedding = "array<double>"
      }
    }
  }
}

sink {
  Milvus {
    url = "http://localhost:19530"
    token = ""
    database = "default"
    batch_size = 100
    schema_save_mode = "CREATE_SCHEMA_WHEN_NOT_EXIST"
    data_save_mode = "APPEND_DATA"
    field_schema = [
      {
        field_name = "id"
        data_type = 5
        is_primary_key = true
        auto_id = true
      },
      {
        field_name = "title"
        data_type = 21
        max_length = 512
      },
      {
        field_name = "content"
        data_type = 21
        max_length = 65535
      },
      {
        field_name = "category"
        data_type = 21
        max_length = 64
      },
      {
        field_name = "score"
        data_type = 11
      },
      {
        field_name = "views"
        data_type = 4
      },
      {
        field_name = "is_published"
        data_type = 1
      },
      {
        field_name = "embedding"
        data_type = 101
        dimension = 128
      }
    ]
  }
}
